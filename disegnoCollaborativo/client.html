
<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disegno collaborativo</title>
    <style>
        /* Stile Globale */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #ddd;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #disegno {
            width: 600px;
            height: 400px;
            border: 1px solid black;
        }
    </style>
</head>
<body>
    <canvas width="600" height="400" id="disegno">
    </canvas>

    <script>      
        const disegno = document.getElementById('disegno');
        const ctx = disegno.getContext("2d");

        const width = disegno.width;
        const height = disegno.height;

        const elements = [];
        let newElement;

        const rect = { 
            x: 0,
            y: 0,
            w: width,
            h: height
        };

        function draw() {
            const { x, y, w, h } = rect;
            ctx.clearRect(0, 0, width, height);
            ctx.beginPath();
            ctx.rect(x, y, w, h);
            ctx.stroke();
            // riesegui draw al prossimo frame
            requestAnimationFrame(draw);
        }

        requestAnimationFrame(draw);

        let dragging = false;
        disegno.addEventListener('mousedown', (e) => {
            dragging = true;
            rect.x = e.offsetX;
            rect.y = e.offsetY;
            rect.w = 0;
            rect.h = 0;
        });

        disegno.addEventListener('mousemove', (e) => {
            if (dragging) {
                rect.w = e.offsetX - rect.x;
                rect.h = e.offsetY - rect.y;
            }
        });


        document.body.addEventListener('mouseup', (e) => {
            dragging = false;
            // console.log("UP " + e.offsetX + ", " + e.offsetY);
        });

        const socket = new WebSocket("ws://localhost:4242");

        socket.addEventListener("message", async event => {
        });

    </script>
</body>
</html>
