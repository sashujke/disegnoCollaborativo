
<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disegno collaborativo</title>
    <style>
        /* Stile Globale */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #ddd;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #disegno {
            width: 600px;
            height: 400px;
            border: 1px solid black;
        }
    </style>
</head>
<body>
    <canvas width="600" height="400" id="disegno">
    </canvas>
    <button id="clear" class="clear"> Clear</button>
    
 
    <script>      
        const disegno = document.getElementById('disegno');
        const ctx = disegno.getContext("2d");

        const width = disegno.width;
        const height = disegno.height;

        const elements = [];
        const customColors = ["red", "blue", "green", "orange", "purple", "brown"];

        function randomColor() {
            return customColors[Math.floor(Math.random() * customColors.length)];
        }

        const rect = { 
            x: 0,
            y: 0,
            w: width,
            h: height,
            color: randomColor()
        };

        function draw() {
            ctx.clearRect(0, 0, width, height);
            elements.forEach(r => {
                ctx.fillStyle = r.color || "black";
                ctx.strokeStyle = r.color || "black";
                ctx.fillRect(r.x, r.y, r.w, r.h);
                ctx.beginPath();
                ctx.rect(r.x, r.y, r.w, r.h);
                ctx.stroke();
            });
            if (dragging) {
                ctx.fillStyle = rect.color || "black";
                ctx.strokeStyle = rect.color || "black";
                ctx.fillRect(rect.x, rect.y, rect.w, rect.h);
                ctx.beginPath();
                ctx.rect(rect.x, rect.y, rect.w, rect.h);
                ctx.stroke();
            }
            requestAnimationFrame(draw);
        }

        let dragging = false;
        requestAnimationFrame(draw);

        disegno.addEventListener('mousedown', (e) => {
            dragging = true;
            rect.x = e.offsetX;
            rect.y = e.offsetY;
            rect.w = 0;
            rect.h = 0;
            rect.color = randomColor();
        });

        disegno.addEventListener('mousemove', (e) => {
            if (dragging) {
                rect.w = e.offsetX - rect.x;
                rect.h = e.offsetY - rect.y;
            }
        });

        document.body.addEventListener('mouseup', () => {
            if (!dragging) return;
            dragging = false;
            if (rect.w === 0 || rect.h === 0) return;
            elements.push({ ...rect });
            console.log(elements);
        });

        const socket = new WebSocket("ws://localhost:4242");

        socket.addEventListener("message", async event => {
        });

    </script>
</body>
</html>
