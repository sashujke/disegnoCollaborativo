
<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disegno collaborativo</title>
    <style>
        /* Stile Globale */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #ddd;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #disegno {
            width: 600px;
            height: 400px;
            border: 1px solid black;
        }
    </style>
</head>
<body>
    <canvas width="600" height="400" id="disegno">
    </canvas>
    <button id="clear" class="clear"> Clear</button>
    
 
    <script>
        const disegno = document.getElementById('disegno');
        const ctx = disegno.getContext('2d');
        const width = disegno.width;
        const height = disegno.height;

        const socket = new WebSocket('ws://localhost:4242');
        const customColors = ['red', 'blue', 'green', 'orange', 'purple', 'brown'];

        let elements = [];
        let dragging = false;
        let rect = null;

        function randomColor() {
            return customColors[Math.floor(Math.random() * customColors.length)];
        }

        function drawRect(r) {
            ctx.fillStyle = r.color || 'black';
            ctx.strokeStyle = r.color || 'black';
            ctx.fillRect(r.x, r.y, r.w, r.h);
            ctx.beginPath();
            ctx.rect(r.x, r.y, r.w, r.h);
            ctx.stroke();
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);
            elements.forEach(drawRect);
            if (dragging && rect) drawRect(rect);
            requestAnimationFrame(draw);
        }

        requestAnimationFrame(draw);

        disegno.addEventListener('mousedown', (e) => {
            dragging = true;
            rect = {
                x: e.offsetX,
                y: e.offsetY,
                w: 0,
                h: 0,
                color: randomColor()
            };
        });

        disegno.addEventListener('mousemove', (e) => {
            if (!dragging || !rect) return;
            rect.w = e.offsetX - rect.x;
            rect.h = e.offsetY - rect.y;
        });

        document.body.addEventListener('mouseup', () => {
            if (!dragging || !rect) return;
            dragging = false;

            const saved = {
                x: rect.w < 0 ? rect.x + rect.w : rect.x,
                y: rect.h < 0 ? rect.y + rect.h : rect.y,
                w: Math.abs(rect.w),
                h: Math.abs(rect.h),
                color: rect.color
            };

            if (saved.w === 0 || saved.h === 0) {
                rect = null;
                return;
            }

            if (socket.readyState === WebSocket.OPEN) {
                socket.send(JSON.stringify(saved));
            }

            rect = null;
        });

        socket.addEventListener('message', (event) => {
            elements = JSON.parse(event.data);
        });
    </script>
</body>
</html>
